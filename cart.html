<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Mithai World</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin-top: 125px;
            padding: 0;
            background: #f8f8f8;
            text-align: center;
        }

        .cart-header {
            background: linear-gradient(135deg, #ff7a18, #ffb347);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
        }

        .cart-container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
        }

        .cart-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-info {
            flex: 1;
        }

        .cart-info h4 {
            margin: 0;
        }

        .cart-info p {
            margin: 5px 0;
            color: #555;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-controls button {
            background: #ff7a18;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .cart-actions {
            text-align: right;
        }

        .remove-btn {
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .summary {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .summary h3 {
            margin-bottom: 10px;
        }

        .checkout-btn {
            width: 100%;
            background: green;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
        }

        .reset-btn {
            width: 100%;
            background: red;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
        }

        .empty {
            text-align: center;
            margin-top: 50px;
            color: #777;
        }
    </style>
</head>

<body>

    <div id="navbar"></div>

    <div class="cart-header">
        🛒 Your Cart
    </div>

    <div class="cart-container" id="cartContainer"></div>

    <div id="footer"></div>

    <script src="js/script.js"></script>

</body>

</html>
